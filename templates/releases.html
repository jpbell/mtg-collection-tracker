{% extends "base.html" %}
{% block content %}
<h1>Release Notes</h1>
<form action="/add-release" method="POST">
    <input type="text" name="version" placeholder="Version" required>
    <input type="text" name="description" placeholder="Notes" style="width: 300px;" required>
    <button type="submit">Publish</button>
</form>

{% for r in releases %}
<div style="margin-top: 20px;">
    <strong>{{ r.version }}</strong>: {{ r.description }}
</div>
{% endfor %}
{% endblock %}
